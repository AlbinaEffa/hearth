<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0" name="viewport"/>
<title>Настройка профиля — Hearth</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet"/>
<style>
  * { font-family: 'Plus Jakarta Sans', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
  .material-symbols-outlined { font-family: 'Material Symbols Outlined'; font-variation-settings: "FILL" 0, "wght" 400; }
  input:focus { outline: none; border-color: var(--primary) !important; box-shadow: 0 0 0 3px rgba(33,29,26,0.12); }
  body { background: var(--surface); min-height: 100dvh; padding-bottom: 100px; }
</style>
<link rel="stylesheet" href="../assets/hearth.css"/>
</head>
<body>

<!-- Top: back + step indicator -->
<div style="padding:16px 20px 0; display:flex; align-items:center; justify-content:space-between;">
  <button style="width:40px; height:40px; border-radius:50%; border:1.5px solid var(--line); background:white; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(33,29,26,0.08);">
    <span class="material-symbols-outlined" style="font-size:20px; color:var(--text-2);">arrow_back</span>
  </button>
  <!-- Step dots -->
  <div style="display:flex; gap:6px; align-items:center;">
    <div style="width:24px; height:6px; border-radius:3px; background:var(--primary);"></div>
    <div style="width:24px; height:6px; border-radius:3px; background:var(--primary);"></div>
    <div style="width:24px; height:6px; border-radius:3px; background:var(--primary);"></div>
    <div style="width:24px; height:6px; border-radius:3px; background:var(--line);"></div>
  </div>
  <div style="width:40px;"></div><!-- spacer -->
</div>

<main style="padding:28px 24px 0;">

  <h1 style="font-size:26px; font-weight:800; color:var(--text-1); letter-spacing:-0.5px; margin-bottom:6px;">Как тебя зовут?</h1>
  <p style="font-size:14px; color:var(--text-3); margin-bottom:32px; line-height:1.5;">Так тебя будет видеть твоя семья в приложении</p>

  <!-- Name input -->
  <div style="margin-bottom:32px;">
    <label style="display:block; font-size:12px; font-weight:700; color:var(--text-3); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px;">Твоё имя</label>
    <input type="text" value="Маша" style="width:100%; height:56px; border-radius:16px; border:2px solid var(--line); padding:0 16px; font-size:18px; font-weight:700; color:var(--text-1); background:white; transition:border-color 0.2s, box-shadow 0.2s;"/>
  </div>

  <!-- Avatar picker -->
  <div style="margin-bottom:24px;">
    <label style="display:block; font-size:12px; font-weight:700; color:var(--text-3); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:14px;">Выбери аватар</label>
    <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:12px;">

      <!-- Selected -->
      <div style="width:100%; aspect-ratio:1; border-radius:50%; background:var(--primary-container); border:3px solid var(--primary); box-shadow:0 0 0 3px rgba(33,29,26,0.18); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:36px; line-height:1;">🦊</div>
      <div style="width:100%; aspect-ratio:1; border-radius:50%; background:var(--surface-2); border:2px solid #e0d5cc; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:36px; line-height:1;">🐻</div>
      <div style="width:100%; aspect-ratio:1; border-radius:50%; background:#f1f1f1; border:2px solid #e0d5cc; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:36px; line-height:1;">🐼</div>
      <div style="width:100%; aspect-ratio:1; border-radius:50%; background:var(--honey); border:2px solid #e0d5cc; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:36px; line-height:1;">🦁</div>
      <div style="width:100%; aspect-ratio:1; border-radius:50%; background:var(--sage-container); border:2px solid #e0d5cc; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:36px; line-height:1;">🐨</div>
      <div style="width:100%; aspect-ratio:1; border-radius:50%; background:#d4edcc; border:2px solid #e0d5cc; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:36px; line-height:1;">🐸</div>
      <div style="width:100%; aspect-ratio:1; border-radius:50%; background:#ffd6e0; border:2px solid #e0d5cc; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:36px; line-height:1;">🐙</div>
      <div style="width:100%; aspect-ratio:1; border-radius:50%; background:#e8d5f5; border:2px solid #e0d5cc; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:36px; line-height:1;">🦋</div>
    </div>
  </div>

  <!-- Upload photo -->
  <button style="width:100%; padding:14px; border-radius:16px; border:2px dashed var(--line); background:transparent; color:var(--text-3); font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;">
    <span class="material-symbols-outlined" style="font-size:18px;">photo_camera</span>
    Загрузить своё фото
  </button>

</main>

<!-- Fixed bottom CTA -->
<div style="position:fixed; bottom:0; left:0; width:100%; padding:16px 24px 40px; background:var(--surface); border-top:1px solid var(--surface-3);">
  <button style="width:100%; height:56px; border-radius:18px; background:var(--primary); color:white; border:none; font-size:16px; font-weight:800; cursor:pointer; box-shadow:0 4px 0 var(--on-primary-container); letter-spacing:-0.3px;">
    Продолжить
  </button>
</div>

</body>
</html>
