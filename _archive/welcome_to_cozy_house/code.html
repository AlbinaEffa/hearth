<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        theme: {
          extend: {

                    "surface-dim": "#dddad4",
                    "surface-container": "#f1ede7",
                    "secondary-fixed-dim": "#d9c684",

                    "inverse-on-surface": "#f4f0ea",
                    "inverse-primary": "#ffb59b",
                    "error-container": "#ffdad6",
                    "secondary": "#6c5d27",
                    "background": "#fdf9f3",
                    "surface": "#fdf9f3",
                    "secondary-container": "#f6e29e",
                    "on-background": "#1c1c18",
                    "secondary-fixed": "#f6e29e",
                    "on-primary-fixed-variant": "#763218",
                    "surface-variant": "#e6e2dc",
                    "primary-fixed-dim": "#ffb59b",
                    "surface-tint": "#94492d",
                    "on-secondary-fixed": "#221b00",
                    "on-tertiary-fixed": "#082007",
                    "on-tertiary-container": "#183115",
                    "on-secondary-container": "#72632c",
                    "tertiary": "#4a6545",
                    "on-secondary-fixed-variant": "#534611",
                    "error": "#ba1a1a",
                    "on-error": "#ffffff",
                    "surface-bright": "#fdf9f3",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed": "#ccebc2",
                    "surface-container-low": "#f7f3ed",
                    "on-error-container": "#93000a",
                    "surface-container-high": "#ebe8e2",
                    "on-surface": "#1c1c18",
                    "primary": "#94492d",
                    "surface-container-highest": "#e6e2dc",
                    "on-primary-fixed": "#380d00",
                    "outline": "#87736c",
                    "on-surface-variant": "#54433d",
                    "on-primary-container": "#521801"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"

            "spacing": {
                    "lg": "40px",
                    "md": "24px",
                    "gutter": "16px",
                    "sm": "12px",
                    "xs": "4px",
                    "margin": "20px",
                    "base": "8px"
            }
          },
        },
      }
    </script>
<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 48
    }
.fluffy-shadow {
    box-shadow: 0 10px 25px -5px rgba(148, 73, 45, 0.15)
    }
.stitch-border {
    border: 2px dashed rgba(135, 115, 108, 0.4)
    }
.pillowy-depth {
    box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.5), 0 4px 6px rgba(0, 0, 0, 0.05)
    }
.wood-grain {
    background-color: #fdf9f3;
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuCdxIu3aMT1hcTelX4TT3QIf9rIgWHT13nqOzGMdpbTBuNThSYCbp85dOOPyvHDULBLBoFmqPx8gvFLJIWCD1wzI6Mi9nre66o9WLDjy3prjyaO52VkSZtnEWvordFiXArWOR5r13O2oCVPDP7pOSzIISX3UCRIkddaQB4nqremsR-Bmd141eUK71_-hZZbh4VldQcP3VGKWttqyvn0YhCEJB-Q9AOhORbrqdmOKMnDXPeF7CcXbNDJu7Cq2XAy6f_C8xelRD6R8DU)
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-['Plus_Jakarta_Sans'] antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background group/design-root overflow-x-hidden">
<div class="relative flex-1 flex flex-col items-center justify-center p-gutter">
<!-- Hero Image Container representing a Cozy Entrance -->
<div class="w-full max-w-[480px] @container">
<div class="@[480px]:px-0 @[480px]:py-3">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden rounded-xl min-h-[360px] relative fluffy-shadow border-4 border-surface-container-highest" data-alt="A warm, cozy entryway of a house with a wooden door, soft glowing golden light from a window, and a small round orange tabby cat sitting on a woven rug." style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAAsPtGB1QLFJvhv5ODZtnnYZh5FNUqwYFrZGET0VOjKAKCVrz4OWe-QWPBH0xqhcDk0yYJ8l2w5MT4DdbGg0YBCYpsX5zzI7YyJJ3yIwm7HzJNzHB0oq6Hv25N2ndZ07r92nfQjuBsN-vBmQf2dknGkmCvz6_K0owkdAab0Q_UiPZbvwKWXvwjENeNcQhypmPcoZxsvO7Bhr4g9NPJ-d4_dcCtDBDfFZm2PqQNp7zv5H139qUvQg9qK9hwvhChftUyhrGg18QWR9o");'>
<!-- Overlay for Logo and Mascot -->
<div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent flex flex-col items-center justify-center">
<!-- Stitch Logo in Embroidery Hoop -->
<div class="bg-surface-container-lowest p-4 rounded-full border-[6px] border-[#8d6658] stitch-border shadow-lg transform -rotate-3 mb-4 flex items-center justify-center">
<div class="w-16 h-16 flex items-center justify-center text-primary">
<span class="material-symbols-outlined !text-5xl" style="font-variation-settings: 'FILL' 1;">home_pin</span>
</div>
</div>
</div>
</div>
</div>
</div>
<!-- Welcome Text -->
<div class="max-w-[480px] w-full text-center mt-6">
<h1 class="text-on-surface text-headline-lg mb-2">Cozy House</h1>
<p class="text-on-surface-variant text-body-md px-4">Welcome home. Please enter your details to step inside the warmth.</p>
</div>
<!-- Interaction Section -->
<div class="max-w-[480px] w-full bg-surface-container-low rounded-xl p-6 mt-8 border border-outline-variant fluffy-shadow">
<!-- Create House Input -->
<div class="flex flex-col gap-2 mb-6">
<label class="flex flex-col flex-1">
<p class="text-on-surface text-label-md pb-2 flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">add_home</span>
                            Create House
                        </p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 rounded-lg text-on-surface focus:outline-none focus:ring-2 focus:ring-secondary-container border border-outline-variant bg-surface-container-lowest h-14 placeholder:text-outline p-[15px] text-body-md transition-all pillowy-depth" placeholder="Name your new home" value=""/>
</div>
</label>
</div>
<!-- Divider with Or -->
<div class="relative flex items-center justify-center my-6">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<span class="relative bg-surface-container-low px-4 text-caption text-outline uppercase tracking-widest">or join one</span>
</div>
<!-- Invite Code Input -->
<div class="flex flex-col gap-2 mb-8">
<label class="flex flex-col flex-1">
<p class="text-on-surface text-label-md pb-2 flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">key</span>
                            Invite Code
                        </p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 rounded-lg text-on-surface focus:outline-none focus:ring-2 focus:ring-secondary-container border border-outline-variant bg-surface-container-lowest h-14 placeholder:text-outline p-[15px] text-body-md transition-all pillowy-depth text-center tracking-[0.5em] font-bold" maxlength="6" placeholder="6-DIGIT CODE" value=""/>
</div>
</label>
</div>
<!-- Primary Action Button -->
<button class="w-full h-16 bg-primary hover:bg-primary-container text-on-primary rounded-xl text-body-lg font-bold transition-all border-b-4 border-[#763218] active:border-b-0 active:translate-y-1 flex items-center justify-center gap-3 fluffy-shadow">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">door_open</span>
                    Open the Door
                </button>
</div>
<!-- Footer Mascot & Support -->
<div class="mt-lg flex flex-col items-center gap-4 opacity-80">
<div class="flex items-center gap-2 bg-secondary-container/30 px-4 py-2 rounded-full border border-secondary-container">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">pets</span>
<p class="text-caption text-on-secondary-container">The Round Cat is waiting for you inside!</p>
</div>
<div class="flex gap-4">
<button class="text-caption text-outline hover:text-primary transition-colors">Privacy Hearth</button>
<span class="text-outline">•</span>
<button class="text-caption text-outline hover:text-primary transition-colors">House Rules</button>
</div>
</div>
</div>
<!-- Background Decorative Elements -->
<div class="fixed top-0 left-0 w-full h-full -z-10 opacity-20 pointer-events-none wood-grain"></div>
<div class="fixed -bottom-20 -right-20 w-80 h-80 bg-primary/5 rounded-full blur-[100px] -z-10"></div>
<div class="fixed -top-20 -left-20 w-80 h-80 bg-secondary/10 rounded-full blur-[100px] -z-10"></div>
</div>
</body></html>
