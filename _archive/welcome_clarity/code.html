<div class="bg-primary text-on-primary py-md px-lg rounded-2xl flex items-center justify-between thick-button fluffy-shadow pillowy-glow">
<div class="flex flex-col items-start">
<span class="font-headline-md text-headline-md">Start your family's journey</span>
<span class="font-caption text-caption opacity-90 mt-xs">Create a new house for your loved ones</span>
</div>
<span class="material-symbols-outlined text-3xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</div>
</button>

<div class="bg-surface-container text-on-surface-variant py-md px-lg rounded-2xl flex items-center justify-between border-2 border-outline-variant hover:bg-surface-variant transition-colors">
