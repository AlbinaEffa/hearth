<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0" name="viewport"/>
<title>Дом создан — Hearth</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../assets/hearth.css"/>
</head>
<body>
<main style="min-height:100dvh; display:flex; flex-direction:column; justify-content:center; padding:40px 24px; gap:28px;">

  <div style="display:flex; flex-direction:column; align-items:center; gap:16px; text-align:center;">
    <div class="avatar" style="width:88px; height:88px; background:var(--sage-container); color:var(--sage);">
      <span class="material-symbols-outlined" style="font-size:44px; font-variation-settings:'FILL' 1;">cottage</span>
    </div>
    <div>
      <h1 class="h1" style="margin-bottom:6px;">Дом создан! 🎉</h1>
      <p class="body muted">Очаг семьи «Ивановы» готов. Пригласите близких, чтобы начать вместе.</p>
    </div>
  </div>

  <!-- Invite code -->
  <div class="card" style="display:flex; flex-direction:column; gap:14px; align-items:center;">
    <p class="caption">Код приглашения</p>
    <p style="font-size:34px; font-weight:800; letter-spacing:10px; color:var(--primary); margin:0; font-variant-numeric:tabular-nums;">H34RTH</p>
    <div class="row" style="gap:10px; width:100%;">
      <button class="btn btn-secondary" style="flex:1;">
        <span class="material-symbols-outlined" style="font-size:20px;">content_copy</span>
        Скопировать
      </button>
      <button class="btn btn-primary" style="flex:1;">
        <span class="material-symbols-outlined" style="font-size:20px;">ios_share</span>
        Поделиться
      </button>
    </div>
  </div>

  <p class="caption" style="text-align:center;">Участники вводят этот код при входе, чтобы присоединиться к дому.</p>

  <a href="../home_dashboard/code.html" class="btn btn-primary btn-block">Войти в дом</a>

</main>
</body>
</html>
