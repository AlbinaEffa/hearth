<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0" name="viewport"/>
<title>Войти в дом — Hearth</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  * { font-family: 'Plus Jakarta Sans', sans-serif; }
  .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; font-family: 'Material Symbols Outlined'; }
  body { min-height: 100dvh; display: flex; flex-direction: column; }
  input:focus { outline: none; }
  /* PIN box */
  .pin-box {
    width: 56px; height: 68px;
    border-radius: 16px;
    border: 2px solid var(--line);
    background: white;
    font-size: 28px; font-weight: 800;
    color: var(--text-1);
    text-align: center;
    transition: border-color 0.2s;
    box-shadow: 0 2px 8px rgba(33,29,26,0.06);
    display: flex; align-items: center; justify-content: center;
  }
  .pin-box.filled {
    border-color: var(--primary);
    background: #fff8f5;
  }
  .pin-box.active {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(33,29,26,0.15);
  }
</style>
<link rel="stylesheet" href="../assets/hearth.css"/>
</head>
<body style="background:var(--surface);">

<!-- Top: back button -->
<header style="padding:16px 20px 0;">
  <button style="width:40px; height:40px; border-radius:50%; border:1.5px solid var(--line); background:white; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(33,29,26,0.08);">
    <span class="material-symbols-outlined" style="font-size:20px; color:var(--text-2);">arrow_back</span>
  </button>
</header>

<!-- Main content -->
<main style="flex:1; display:flex; flex-direction:column; align-items:center; padding:0 32px; padding-top:32px;">

  <!-- Illustration -->
  <div style="width:100px; height:100px; border-radius:28px; background:linear-gradient(135deg, var(--surface-2) 0%, var(--surface) 100%); border:2px solid var(--line); display:flex; align-items:center; justify-content:center; margin-bottom:24px; box-shadow:0 8px 24px rgba(33,29,26,0.12);">
    <span style="font-size:52px; line-height:1;">🏡</span>
  </div>

  <h1 style="font-size:26px; font-weight:800; color:var(--text-1); text-align:center; letter-spacing:-0.5px; margin-bottom:8px;">Войти в очаг</h1>
  <p style="font-size:14px; color:var(--text-3); text-align:center; line-height:1.5; max-width:260px; margin-bottom:36px;">Введи 6-значный PIN-код, который прислал тебе создатель вашего дома</p>

  <!-- PIN input boxes -->
  <div style="display:flex; gap:10px; margin-bottom:12px;">
    <div class="pin-box filled">3</div>
    <div class="pin-box filled">7</div>
    <div class="pin-box filled">2</div>
    <div class="pin-box active"></div>
    <div class="pin-box"></div>
    <div class="pin-box"></div>
  </div>

  <p style="font-size:12px; color:var(--text-3); margin-bottom:36px;">Введено 3 из 6 символов</p>

  <!-- Hint block -->
  <div style="background:var(--honey); border-radius:16px; padding:14px 16px; width:100%; max-width:320px; display:flex; gap:10px; align-items:flex-start; margin-bottom:32px;">
    <span style="font-size:18px; flex-shrink:0; margin-top:1px;">💡</span>
    <div>
      <p style="font-size:12px; color:var(--on-honey); font-weight:700; margin-bottom:2px;">Где взять код?</p>
      <p style="font-size:11px; color:var(--text-2); line-height:1.4;">Попроси создателя вашего дома открыть приложение → Профиль → «Пригласить в дом» — там он найдёт PIN.</p>
    </div>
  </div>

  <!-- Numpad keyboard (simplified) -->
  <div style="width:100%; max-width:280px;">
    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
      <button style="padding:18px; border-radius:16px; border:1.5px solid var(--line); background:white; font-size:20px; font-weight:700; color:var(--text-1); cursor:pointer; box-shadow:0 2px 4px rgba(33,29,26,0.06);">1</button>
      <button style="padding:18px; border-radius:16px; border:1.5px solid var(--line); background:white; font-size:20px; font-weight:700; color:var(--text-1); cursor:pointer; box-shadow:0 2px 4px rgba(33,29,26,0.06);">2</button>
      <button style="padding:18px; border-radius:16px; border:1.5px solid var(--line); background:white; font-size:20px; font-weight:700; color:var(--text-1); cursor:pointer; box-shadow:0 2px 4px rgba(33,29,26,0.06);">3</button>
      <button style="padding:18px; border-radius:16px; border:1.5px solid var(--line); background:white; font-size:20px; font-weight:700; color:var(--text-1); cursor:pointer; box-shadow:0 2px 4px rgba(33,29,26,0.06);">4</button>
      <button style="padding:18px; border-radius:16px; border:1.5px solid var(--line); background:white; font-size:20px; font-weight:700; color:var(--text-1); cursor:pointer; box-shadow:0 2px 4px rgba(33,29,26,0.06);">5</button>
      <button style="padding:18px; border-radius:16px; border:1.5px solid var(--line); background:white; font-size:20px; font-weight:700; color:var(--text-1); cursor:pointer; box-shadow:0 2px 4px rgba(33,29,26,0.06);">6</button>
      <button style="padding:18px; border-radius:16px; border:1.5px solid var(--line); background:white; font-size:20px; font-weight:700; color:var(--text-1); cursor:pointer; box-shadow:0 2px 4px rgba(33,29,26,0.06);">7</button>
      <button style="padding:18px; border-radius:16px; border:1.5px solid var(--line); background:white; font-size:20px; font-weight:700; color:var(--text-1); cursor:pointer; box-shadow:0 2px 4px rgba(33,29,26,0.06);">8</button>
      <button style="padding:18px; border-radius:16px; border:1.5px solid var(--line); background:white; font-size:20px; font-weight:700; color:var(--text-1); cursor:pointer; box-shadow:0 2px 4px rgba(33,29,26,0.06);">9</button>
      <div></div>
      <button style="padding:18px; border-radius:16px; border:1.5px solid var(--line); background:white; font-size:20px; font-weight:700; color:var(--text-1); cursor:pointer; box-shadow:0 2px 4px rgba(33,29,26,0.06);">0</button>
      <!-- Backspace -->
      <button style="padding:18px; border-radius:16px; border:1.5px solid var(--line); background:white; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 4px rgba(33,29,26,0.06);">
        <span class="material-symbols-outlined" style="font-size:22px; color:var(--text-2);">backspace</span>
      </button>
    </div>
  </div>

</main>

<!-- Bottom CTA -->
<div style="padding:20px 32px 40px;">
  <button style="width:100%; padding:16px; border-radius:18px; background:var(--primary); color:white; border:none; font-size:16px; font-weight:800; cursor:pointer; box-shadow:0 4px 0 var(--on-primary-container); letter-spacing:-0.3px; opacity:0.5;" disabled>
    Войти в дом
  </button>
  <p style="text-align:center; font-size:12px; color:var(--text-3); margin-top:16px;">Или <span style="color:var(--primary); font-weight:700; cursor:pointer; text-decoration:underline;">создай свой новый дом →</span></p>
</div>

</body>
</html>
